name: Build and deploy v2 container

on:
  push:
    branches:
      - v2
      - master
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: registry.cn-hangzhou.aliyuncs.com/fjrcn/hhs-class-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate lesson JSON
        # Optional build-time AI for lesson JSON generation only.
        # Runtime AI requests are sent directly from the browser.
        env:
          V2_LESSON_AI_ENDPOINT: ${{ secrets.V2_LESSON_AI_ENDPOINT }}
          V2_LESSON_AI_MODEL: ${{ secrets.V2_LESSON_AI_MODEL }}
        run: python scripts/generate_lessons.py

      - name: Commit generated lesson JSON
        run: |
          if git diff --quiet -- public/generated-lessons; then
            echo "No generated lesson changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/generated-lessons
          git commit -m "生成 v2 课文模板 JSON"
          git push

      - name: Set image tags
        id: meta
        run: |
          short_sha="$(git rev-parse --short=7 HEAD)"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "sha_tag=${IMAGE_NAME}:${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "v2_tag=${IMAGE_NAME}:v2" >> "${GITHUB_OUTPUT}"

      - name: Login to Aliyun registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.V2_ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.V2_ALIYUN_DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.v2_tag }}
            ${{ steps.meta.outputs.sha_tag }}

      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.V2_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "${DEPLOY_WEBHOOK_URL}" ]; then
            echo "DEPLOY_WEBHOOK_URL secret is not configured."
            exit 1
          fi
          curl --fail --show-error --silent --request POST "${DEPLOY_WEBHOOK_URL}"
