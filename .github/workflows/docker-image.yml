name: Build and deploy container

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: registry.cn-hangzhou.aliyuncs.com/fjrcn/hhs-class-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: meta
        run: |
          short_sha="$(git rev-parse --short=7 HEAD)"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "sha_tag=${IMAGE_NAME}:${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "latest_tag=${IMAGE_NAME}:latest" >> "${GITHUB_OUTPUT}"

      - name: Login to Aliyun registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.latest_tag }}
            ${{ steps.meta.outputs.sha_tag }}

      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "${DEPLOY_WEBHOOK_URL}" ]; then
            echo "DEPLOY_WEBHOOK_URL secret is not configured."
            exit 1
          fi
          curl --fail --show-error --silent --request POST "${DEPLOY_WEBHOOK_URL}"
