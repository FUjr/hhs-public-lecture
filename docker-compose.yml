services:
  hhs-class-1-v2:
    image: registry.cn-hangzhou.aliyuncs.com/fjrcn/hhs-class-1:v2
    container_name: hhs-class-1-v2
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      V2_LESSON_AI_ENDPOINT: ${V2_LESSON_AI_ENDPOINT:-}
      V2_LESSON_AI_MODEL: ${V2_LESSON_AI_MODEL:-}
      DEPLOY_WEBHOOK_TOKEN: ${DEPLOY_WEBHOOK_TOKEN:-}
      DEPLOY_UPDATE_COMMAND: >-
        ${DEPLOY_UPDATE_COMMAND:-docker run -d --rm --name hhs-class-1-v2-updater
        -v /var/run/docker.sock:/var/run/docker.sock
        -v ${PWD}:${PWD}
        -w ${PWD}
        registry.cn-hangzhou.aliyuncs.com/fjrcn/hhs-class-1:v2
        sh -c 'sleep 2; docker compose -f ${PWD}/docker-compose.yml --project-directory ${PWD} pull hhs-class-1-v2 && docker compose -f ${PWD}/docker-compose.yml --project-directory ${PWD} up -d hhs-class-1-v2'}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:${PWD}
