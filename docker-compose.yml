services:
  hhs-class-1:
    image: registry.cn-hangzhou.aliyuncs.com/fjrcn/hhs-class-1:latest
    container_name: hhs-class-1
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      LESSON_AI_ENDPOINT: ${LESSON_AI_ENDPOINT:-}
      LESSON_AI_API_KEY: ${LESSON_AI_API_KEY:-}
      LESSON_AI_MODEL: ${LESSON_AI_MODEL:-}
      DEPLOY_WEBHOOK_TOKEN: ${DEPLOY_WEBHOOK_TOKEN:-}
      DEPLOY_UPDATE_COMMAND: >-
        ${DEPLOY_UPDATE_COMMAND:-docker run -d --rm --name hhs-class-1-updater
        -v /var/run/docker.sock:/var/run/docker.sock
        -v ${PWD}:${PWD}
        -w ${PWD}
        registry.cn-hangzhou.aliyuncs.com/fjrcn/hhs-class-1:latest
        sh -c 'sleep 2; docker compose -f ${PWD}/docker-compose.yml --project-directory ${PWD} pull hhs-class-1 && docker compose -f ${PWD}/docker-compose.yml --project-directory ${PWD} up -d hhs-class-1'}
    volumes:
      - ./session_logs:/app/session_logs
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:${PWD}
